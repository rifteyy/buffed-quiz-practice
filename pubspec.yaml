name: buffed_quiz_practice
description: Pokročilá vzdělávací aplikace pro procvičení testujících otázek s AI podporou.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  http: ^1.2.2
  go_router: ^14.8.1
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/data/
    - assets/icon.png
    - assets/placeholder.png
